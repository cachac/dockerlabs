<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Hello Docker</title>
    <style type="text/css">
        :root {
            --primary-color: #2496ed; /* Docker Blue */
            --text-main: #2c3e50;
            --bg-gradient: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: var(--bg-gradient);
            color: var(--text-main);
            line-height: 1.6;
        }

        .container {
            background-color: white;
            padding: 3rem;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 500px;
            width: 90%;
            transition: transform 0.3s ease;
        }

        .container:hover {
            transform: translateY(-5px);
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 1rem;
            color: #1a1a1a;
            letter-spacing: -1px;
        }

        p {
            font-size: 1.1rem;
            color: #5d6d7e;
        }

        b {
            color: var(--primary-color);
            background: rgba(36, 150, 237, 0.1);
            padding: 2px 8px;
            border-radius: 4px;
            font-weight: 600;
        }

        .logo {
            width: 80px;
            margin-bottom: 1.5rem;
        }

        /* Decorative element */
        .nginx-badge {
            display: inline-block;
            margin-top: 20px;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 4px 12px;
            border: 1px solid #ddd;
            border-radius: 20px;
            color: #888;
        }
    </style>
</head>
<body>

<div class="container">
    <img src="https://upload.wikimedia.org/wikipedia/commons/1/1e/Docker_Logo.png" height="75px" />

    <h1>Hello Docker!</h1>
    
    <p>Este demo es ejecutado por <b>docker</b>.<br>
    Container running Nginx.</p>

    <div class="nginx-badge">Status: Online</div>
</div>

</body>
</html>
